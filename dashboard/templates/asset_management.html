{% extends "base.html" %}
{% block title %}Manage Assets - RPA Framework{% endblock %}
{% block head_extra %}
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<style>
    .container {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: var(--space-2xl);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: var(--space-xl);
        border-bottom: 1px solid var(--border-subtle);
    }

    .main-content {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: var(--space-xl);
    }

    @media (max-width: 900px) {
        .main-content { grid-template-columns: 1fr; }
    }

    .form-group { margin-bottom: var(--space-lg); }

    .asset-item {
        padding: 16px 20px;
        background: var(--bg-glass);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--space-sm);
        transition: var(--transition-normal);
    }

    .asset-item:hover {
        background: var(--bg-glass-hover);
        border-color: var(--border-focus);
        transform: translateX(4px);
    }

    .asset-symbol {
        font-family: var(--font-header);
        font-weight: 800;
        color: var(--accent-primary);
        font-size: 16px;
    }

    .asset-name {
        font-size: 12px;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
    }

    .status-message {
        margin-top: var(--space-md);
        padding: 12px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 600;
        display: none;
    }

    .status-message.success { background: rgba(20, 241, 217, 0.1); color: var(--accent-secondary); display: block; }
    .status-message.error { background: rgba(255, 91, 91, 0.1); color: #ff5b5b; display: block; }

    .empty-state {
        text-align: center;
        padding: var(--space-2xl);
        color: var(--text-tertiary);
    }

    .loading-spinner {
        border: 2px solid var(--border-subtle);
        border-top: 2px solid var(--accent-primary);
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 0.8s linear infinite;
        margin: 0 auto var(--space-md);
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
{% block content %}
<div class="container">
        <div class="header">
            <h1> Manage Preferred Assets</h1>
            <a href="/menu" class="back-btn"> Back to Menu</a>
        </div>

        <div class="main-content">
            <!-- Add/Edit Form -->
            <div class="card">
                <h2> Add New Asset</h2>
                <form id="assetForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="symbol">Symbol</label>
                            <input type="text" id="symbol" name="symbol" placeholder="e.g., BTC" maxlength="10" required>
                        </div>
                        <div class="form-group">
                            <label for="name">Asset Name</label>
                            <input type="text" id="name" name="name" placeholder="e.g., Bitcoin" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Asset</button>
                    <div id="formStatus" class="status-message"></div>
                </form>
            </div>

            <!-- Assets List -->
            <div class="card">
                <h2> Current Assets</h2>
                <div id="assetsList" class="assets-list">
                    <div class="empty-state">
                        <div class="empty-state-icon"></div>
                        <p>Loading assets...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];

        // Load assets on page load
        document.addEventListener('DOMContentLoaded', loadAssets);

        // Form submission
        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const symbol = document.getElementById('symbol').value.trim().toUpperCase();
            const name = document.getElementById('name').value.trim();

            if (!symbol || !name) {
                showFormStatus('Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/assets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, name })
                });

                const data = await response.json();

                if (data.success) {
                    showFormStatus(' Asset added successfully!', 'success');
                    document.getElementById('assetForm').reset();
                    setTimeout(loadAssets, 500);
                } else {
                    showFormStatus(' ' + data.message, 'error');
                }
            } catch (error) {
                showFormStatus(' Error: ' + error.message, 'error');
            }
        });

        async function loadAssets() {
            const assetsList = document.getElementById('assetsList');
            assetsList.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div>Loading...</div>';

            try {
                const response = await fetch('/api/assets', { cache: 'no-store' });
                const data = await response.json();

                allAssets = data.assets || [];

                if (allAssets.length === 0) {
                    assetsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon"></div>
                            <p>No assets added yet. Add one using the form on the left!</p>
                        </div>
                    `;
                } else {
                    assetsList.innerHTML = allAssets.map(asset => `
                        <div class="asset-item">
                            <div class="asset-info">
                                <div class="asset-symbol">${asset.symbol}</div>
                                <div class="asset-name">${asset.name}</div>
                            </div>
                            <div class="asset-actions">
                                <button class="delete-btn btn-minimal" onclick="deleteAsset(${asset.id})">Delete</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                assetsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"></div>
                        <p>Error loading assets: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function deleteAsset(id) {
            if (!confirm('Are you sure you want to delete this asset?')) return;

            try {
                const response = await fetch(`/api/assets/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    loadAssets();
                } else {
                    alert(' Failed to delete asset: ' + data.message);
                }
            } catch (error) {
                alert(' Error: ' + error.message);
            }
        }

        function showFormStatus(message, type) {
            const status = document.getElementById('formStatus');
            status.textContent = message;
            status.className = 'status-message ' + type;
            setTimeout(() => {
                status.className = 'status-message';
            }, 4000);
        }
    </script>
{% endblock %}
