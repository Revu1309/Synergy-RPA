{% extends "base.html" %}
{% block title %}{{ title or "Dashboard Error" }}{% endblock %}
{% block head_extra %}
<style>
    .error-wrap {
        max-width: 720px;
        margin: 64px auto;
        background: var(--bg-panel);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 32px 40px;
        box-shadow: var(--shadow-lg);
        position: relative;
    }
    .error-wrap::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 6px;
        background: var(--accent-grad);
        border-radius: var(--radius-md) 0 0 var(--radius-md);
    }
    .error-title {
        margin: 0 0 12px 0;
        font-size: 24px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.5px;
    }
    .error-body {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
    }</style>
{% endblock %}
{% block content %}
<div class="error-wrap">
    <h2 class="error-title">{{ title or "Dashboard Error" }}</h2>
    <p class="error-body">{{ message }}</p>
</div>
{% endblock %}
