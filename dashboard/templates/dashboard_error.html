{% extends "base.html" %}
{% block title %}{{ title or "Dashboard Error" }}{% endblock %}
{% block head_extra %}
<style>
    .error-wrap {
        max-width: 720px;
        margin: 40px auto;
        background: #ffffff;
        border: 1px solid #e0e6f2;
        border-radius: 14px;
        padding: 24px 26px;
        box-shadow: 0 10px 26px rgba(15, 32, 60, 0.08);
    }
    .error-title {
        margin: 0 0 10px 0;
        font-size: 22px;
        color: #1f2d3d;
    }
    .error-body {
        margin: 0;
        color: #4a5a70;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
    }
</style>
{% endblock %}
{% block content %}
<div class="error-wrap">
    <h2 class="error-title">{{ title or "Dashboard Error" }}</h2>
    <p class="error-body">{{ message }}</p>
</div>
{% endblock %}
