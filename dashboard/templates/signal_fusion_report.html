{% extends "base.html" %}
{% block title %}Signal Fusion Report - RPA Framework{% endblock %}
{% block head_extra %}
<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
        <style>
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
            }
            .header {
                background: var(--bg-panel);
                border-radius: var(--radius-md);
                padding: 24px 32px;
                margin-bottom: 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 20px;
                flex-wrap: wrap;
                box-shadow: var(--shadow-lg);
                border: 1px solid var(--border-subtle);
                position: relative;
            }
            .header::before {
                content: "";
                position: absolute;
                inset: 0 auto 0 0;
                width: 6px;
                background: var(--accent-grad);
                border-radius: var(--radius-md) 0 0 var(--radius-md);
            }
            .title { font-size: 26px; font-weight: 800; margin: 0 0 8px 0; color: var(--text-primary); letter-spacing: -0.5px; }
            .subtitle { margin: 0; color: var(--text-tertiary); font-size: 14px; }
            .controls { display: flex; gap: 12px; align-items: center; }
            .btn {
                border: none;
                border-radius: var(--radius-sm);
                padding: 10px 18px;
                font-weight: 600;
                cursor: pointer;
                transition: var(--transition-normal);
                font-size: 13px;
            }
            .btn-primary { background: var(--accent-primary); color: white; }
            .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--glow-primary); }
            .btn-secondary { background: var(--bg-glass); color: var(--text-primary); border: 1px solid var(--border-subtle); }
            .btn-secondary:hover { background: var(--bg-glass-hover); }
            .card-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 16px;
                margin-bottom: 24px;
            }
            .card {
                background: var(--bg-panel);
                border-radius: var(--radius-md);
                padding: 24px;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--border-subtle);
                text-align: center;
            }
            .label { color: var(--text-tertiary); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
            .value { color: var(--accent-tertiary); font-size: 34px; font-weight: 800; margin-top: 12px; }
            .chart {
                background: var(--bg-panel);
                border-radius: var(--radius-md);
                padding: 24px;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--border-subtle);
            }
            .row { display: flex; align-items: center; gap: 12px; color: var(--text-tertiary); font-size: 13px; font-weight: 600; }
            select {
                padding: 8px 12px;
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-sm);
                background: var(--bg-glass);
                color: var(--text-primary);
                font-size: 13px;
                cursor: pointer;
            }
        </style>
{% endblock %}
{% block content %}
<div class="container">
            <div class="header">
                <div>
                    <h1 class="title">Signal Fusion Report</h1>
                    <p class="subtitle">Dedicated report for fused crypto/social/weather signal index</p>
                </div>
                <div class="controls">
                    <div class="row">
                        <label for="hoursFilter">Hours:</label>
                        <select id="hoursFilter" onchange="loadFusion()">
                            <option value="6">6</option>
                            <option value="12">12</option>
                            <option value="24" selected>24</option>
                            <option value="48">48</option>
                            <option value="72">72</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="loadFusion()">Refresh</button>
                    <button class="btn btn-secondary" onclick="window.location.href='/menu'">Menu</button>
                </div>
            </div>

            <div class="card-grid">
                <div class="card">
                    <div class="label">Current Fusion Score</div>
                    <div id="fusionScore" class="value">0.00</div>
                </div>
                <div class="card">
                    <div class="label">Confidence Level</div>
                    <div id="fusionConfidence" class="value" style="font-size: 28px;">Low</div>
                </div>
            </div>

            <div class="chart">
                <div id="fusionChart"></div>
            </div>
        </div>

        <script>
            async function loadFusion() {
                const hours = parseInt(document.getElementById('hoursFilter').value || '24');
                const response = await fetch(`/api/signal-fusion?hours=${hours}&t=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();

                const series = data.series || [];
                const latest = series.length ? series[series.length - 1] : { fusion_score: 0 };
                document.getElementById('fusionScore').textContent = Number(latest.fusion_score || 0).toFixed(2);
                document.getElementById('fusionConfidence').textContent = data.latest_confidence_level || 'Low';

                const x = series.map(p => p.timestamp);
                const y = series.map(p => p.fusion_score);

                Plotly.newPlot('fusionChart', [{
                    x: x,
                    y: y,
                    mode: 'lines+markers',
                    name: 'Fusion Score',
                    line: { color: '#f39c12', width: 3 }
                }], {
                    title: `Signal Fusion Index (${hours}h)`,
                    yaxis: { title: 'Score', range: [0, 100] },
                    xaxis: { title: 'Time' },
                    margin: { l: 60, r: 20, t: 50, b: 60 },
                    paper_bgcolor: 'rgba(255,255,255,0)',
                    plot_bgcolor: 'rgba(255,255,255,0)'
                }, {responsive: true});
            }

            loadFusion();
            setInterval(loadFusion, 60000);
        </script>
{% endblock %}
