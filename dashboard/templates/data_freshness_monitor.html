{% extends "base.html" %}
{% block title %}Data Freshness Monitor{% endblock %}
{% block head_extra %}
<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <style>
            
            .wrap { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
            .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; color: var(--text-primary); }
            .title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
            .sub { color: var(--text-tertiary); font-size: 13px; margin-top: 4px; }
            .row { display:flex; gap:12px; align-items:center; flex-wrap: wrap; }
            button { border:none; background: var(--accent-primary); color:white; border-radius: var(--radius-sm); padding: 10px 18px; cursor:pointer; font-weight:600; font-size: 13px; transition: var(--transition-normal); }
            button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--glow-primary); }
            button.secondary { background: var(--bg-glass); color: var(--text-primary); border: 1px solid var(--border-subtle); }
            button.secondary:hover { background: var(--bg-glass-hover); border-color: var(--border-focus); }
            .banner { display:none; margin: 16px 0; padding: 14px 20px; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; }
            .banner.stale { display:block; background: rgba(231, 76, 60, 0.1); border:1px solid rgba(231, 76, 60, 0.2); color:#e74c3c; }
            .banner.ok { display:block; background: rgba(39, 174, 96, 0.1); border:1px solid rgba(39, 174, 96, 0.2); color:#27ae60; }
            .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
            .card { background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 24px; box-shadow: var(--shadow-md); transition: var(--transition-normal); }
            .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
            .head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px; }
            .head strong { font-size: 16px; color: var(--text-primary); }
            .status { font-size: 11px; border-radius: 999px; padding: 3px 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
            .fresh { background: rgba(39, 174, 96, 0.1); color:#27ae60; border: 1px solid rgba(39, 174, 96, 0.2); }
            .stale { background: rgba(231, 76, 60, 0.1); color:#e74c3c; border: 1px solid rgba(231, 76, 60, 0.2); }
            .no_data { background: var(--bg-secondary); color: var(--text-tertiary); border: 1px solid var(--border-subtle); }
            .kv { font-size:13px; margin: 6px 0; color: var(--text-secondary); }
            .muted { color: var(--text-tertiary); font-size:12px; }
        </style>
{% endblock %}
{% block content %}
<div class="wrap">
            <div class="top">
                <div>
                    <div class="title">Data Freshness Monitor</div>
                    <div class="sub">Tracks last successful sync per module and flags stale pipelines.</div>
                </div>
                <div class="row">
                    <button class="secondary" onclick="window.location.href='/menu'">Back to Menu</button>
                    <button onclick="loadFreshness()">Refresh</button>
                </div>
            </div>
            <div id="banner" class="banner"></div>
            <div id="cards" class="grid"></div>
            <div id="foot" class="muted" style="margin-top:10px;"></div>
        </div>
        <script>
            function fmtDate(v) {
                if (!v) return 'N/A';
                const d = new Date(v);
                if (Number.isNaN(d.getTime())) return v;
                return d.toLocaleString();
            }

            function statusClass(s) {
                if (s === 'fresh') return 'fresh';
                if (s === 'stale') return 'stale';
                return 'no_data';
            }

            async function loadFreshness() {
                const resp = await fetch('/api/data-freshness', { cache: 'no-store' });
                const data = await resp.json();
                if (!data.success) {
                    document.getElementById('cards').innerHTML = '<div class="card">Failed to load data freshness.</div>';
                    return;
                }

                const cards = document.getElementById('cards');
                cards.innerHTML = '';
                (data.modules || []).forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="head">
                            <strong>${m.module}</strong>
                            <span class="status ${statusClass(m.status)}">${m.status.toUpperCase()}</span>
                        </div>
                        <div class="kv">Last Sync: ${fmtDate(m.last_sync)}</div>
                        <div class="kv">Data Age: ${m.age_minutes === null ? 'N/A' : m.age_minutes + ' min'}</div>
                        <div class="kv">Expected Interval: ${m.expected_interval_minutes} min</div>
                        <div class="kv">Stale Threshold: ${m.stale_after_minutes} min</div>
                        <div class="kv">Rows in Snapshot: ${m.row_count}</div>
                        <div class="muted">${m.message}</div>
                    `;
                    cards.appendChild(div);
                });

                const banner = document.getElementById('banner');
                if ((data.stale_count || 0) > 0) {
                    banner.className = 'banner stale';
                    banner.textContent = `Alert: ${data.stale_count} pipeline(s) are stale.`;
                } else {
                    banner.className = 'banner ok';
                    banner.textContent = 'All monitored pipelines are fresh.';
                }
                document.getElementById('foot').textContent = 'Last checked: ' + fmtDate(data.generated_at);
            }

            loadFreshness();
            setInterval(loadFreshness, 30000);
        </script>
{% endblock %}
