{% extends "base.html" %}
{% block title %}RPA Dashboard - Synergy Framework{% endblock %}
{% block page_title %}Dashboard{% endblock %}

{% block head_extra %}
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
/* Minimal page-specific overrides - use dashboard.css glass classes */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}
.alerts {
  margin-top: var(--space-xl);
}
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  color: var(--text-tertiary);
  text-align: center;
}
.spinner {
  border: 3px solid var(--border-subtle);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin-bottom: var(--space-md);
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
{% endblock %}

{% block content %}
<div class="ai-workspace">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading real-time data...</p>
  </div>

  <div id="dashboard-content" style="display: none;">
    <section class="metrics-grid" id="metrics">
      <!-- Dynamic metrics cards -->
    </section>
    <section class="charts-grid" id="charts">
      <!-- Dynamic charts -->
    </section>
    <section class="alerts" id="alerts">
      <!-- Dynamic alerts -->
    </section>
  </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
async function loadDashboard() {
  const loading = document.getElementById('loading');
  const content = document.getElementById('dashboard-content');
  
  loading.style.display = 'flex';
  content.style.display = 'none';
  loading.innerHTML = '<div class="spinner"></div><p>Refreshing dashboard...</p>';
  
  try {
    const timestamp = Date.now();
    const response = await fetch(`/api/dashboard-data?t=${timestamp}`, { cache: 'no-store' });
    const data = await response.json();
    
    updateMetrics(data.metrics || {});
    updateCharts(data.charts || []);
    updateAlerts(data.alerts || []);
    
    loading.style.display = 'none';
    content.style.display = 'block';
  } catch (error) {
    console.error('Dashboard load error:', error);
    loading.innerHTML = '<p style="color: var(--text-secondary);">Error loading data. <button class="btn" onclick="loadDashboard()">Retry</button></p>';
  }
}

function updateMetrics(metrics) {
  const container = document.getElementById('metrics');
  container.innerHTML = '';
  
  Object.entries(metrics).forEach(([key, value]) => {
    container.innerHTML += `
      <div class="card kpi-card">
        <div class="kpi-title">${key}</div>
        <div class="kpi-value">${value}</div>
      </div>
    `;
  });
}

function updateCharts(charts) {
  const container = document.getElementById('charts');
  container.innerHTML = '';
  
  charts.forEach((chart, index) => {
    const chartId = `chart-${index}`;
    container.innerHTML += `<div class="card chart-container"><h3>${chart.title || 'Chart'}</h3><div id="${chartId}" style="height: 300px;"></div></div>`;
    
    if (chart.data && chart.layout) {
      Plotly.newPlot(chartId, chart.data, chart.layout || {});
    }
  });
}

function updateAlerts(alerts) {
  const container = document.getElementById('alerts');
  if (alerts.length === 0) {
    container.innerHTML = '<div class="card"><div class="status-pill fresh">All systems normal</div></div>';
    return;
  }
  
  container.innerHTML = alerts.map(alert => 
    `<div class="card alert alert-${alert.level || 'low'}">${alert.message}</div>`
  ).join('');
}

// Theme switcher JS
function setTheme(theme) {
  fetch('/api/ui-theme', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ theme })
  }).then(() => location.reload());
}

// Load on start
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
  // Auto-refresh every 5 min
  setInterval(loadDashboard, 300000);
  
  // Load current theme
  fetch('/api/ui-theme').then(res => res.json()).then(data => {
    const select = document.querySelector('.theme-toggle');
    if (select && data.theme) select.value = data.theme;
  });
});
</script>
{% endblock %}
